server {
    listen 80;
    server_name comuneros.tudominio.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name comuneros.tudominio.com;

    # SSL lo maneja ServerAvatar / Let's Encrypt del VPS
    ssl_certificate /etc/letsencrypt/live/comuneros.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comuneros.tudominio.com/privkey.pem;

    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
